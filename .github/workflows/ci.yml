name: CI
on:
  push: { branches: [main] }
  pull_request: {}

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/backend } }
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run pytest -q

  landing:
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: apps/landing } }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: apps/landing/package-lock.json }
      - run: npm ci || npm install
      - run: npm run build

  # iOS and Android builds need macOS / Android SDK runners — added in Phase 1.
