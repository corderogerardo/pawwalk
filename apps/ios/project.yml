# XcodeGen spec. Run `xcodegen generate` to create PawWalk.xcodeproj from this
# file, then `open PawWalk.xcodeproj`. The .xcodeproj is NOT committed — this
# YAML is the source of truth, which keeps the monorepo clean and diff-able.
name: PawWalk
options:
  bundleIdPrefix: com.pawwalk
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""          # set your Apple Team ID to run on a device

targets:
  PawWalk:
    type: application
    platform: iOS
    sources:
      - PawWalk
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.pawwalk.ios
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"   # iPhone + iPad
    info:
      path: PawWalk/Info.plist
      properties:
        CFBundleDisplayName: PawWalk
        UILaunchScreen: {}
        # Dev only: allow the app to reach the backend over http://localhost.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Live GPS tracking streams the device location to the walk in progress.
        NSLocationWhenInUseUsageDescription: PawWalk uses your location to show the live walk route while a walk is in progress.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # Bundled brand fonts (DM Sans + JetBrains Mono) in Resources/Fonts.
        UIAppFonts:
          - DMSans-Regular.ttf
          - DMSans-Medium.ttf
          - DMSans-SemiBold.ttf
          - DMSans-Bold.ttf
          - JetBrainsMono-Regular.ttf
          - JetBrainsMono-Medium.ttf
          - JetBrainsMono-SemiBold.ttf
